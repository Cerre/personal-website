name: Generate Chess Puzzles

on:
  schedule:
    # Run every day at 3:00 AM UTC
    - cron: '0 3 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate-puzzles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-chess.txt
          sudo apt-get update
          sudo apt-get install -y stockfish
          which stockfish
      
      - name: Generate puzzles
        run: python generate_puzzles.py
        env:
          CHESS_USERNAME: ${{ secrets.CHESS_USERNAME || 'Toxima1' }}
          CHESS_PLATFORM: ${{ secrets.CHESS_PLATFORM || 'chess.com' }}
          STOCKFISH_PATH: '/usr/games/stockfish'
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add puzzles.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update chess puzzles [skip ci]"
          git push 