name: Generate Chess Puzzles

on:
  schedule:
    # Run every day at 3:00 AM UTC
    - cron: '0 3 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

# Add permissions for the GITHUB_TOKEN
permissions:
  contents: write

jobs:
  generate-puzzles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r chess_puzzles/requirements.txt
          sudo apt-get update
          sudo apt-get install -y stockfish
          which stockfish
      
      - name: Generate puzzles
        run: python chess_puzzles/run_chess_puzzles.py
        env:
          CHESS_USERNAME: ${{ secrets.CHESS_USERNAME || 'Toxima' }}
          CHESS_PLATFORM: ${{ secrets.CHESS_PLATFORM || 'lichess' }}
          STOCKFISH_PATH: '/usr/games/stockfish'
          MAX_GAMES: '15'
          DEFAULT_TIME_LIMIT: '1.0'
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if puzzles.json exists before trying to add it
          if [ -f chess_puzzles/puzzles.json ]; then
            git add chess_puzzles/puzzles.json
            
            # Also add position_evaluations.json if it exists
            if [ -f chess_puzzles/position_evaluations.json ]; then
              git add chess_puzzles/position_evaluations.json
            fi
            
            git diff --quiet && git diff --staged --quiet || git commit -m "Update chess puzzles [skip ci]"
            git push
          else
            echo "No puzzles.json file was generated. Skipping commit."
          fi 